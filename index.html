    <script>
      (function(){
        // Owner decision: default theme is ALWAYS light. Dark only when the user
        // explicitly toggled it (persisted in localStorage). Do NOT follow the OS
        // prefers-color-scheme — clients open to a light surface by default.
        var saved = localStorage.getItem('hawkamah-theme');
        if (saved === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
