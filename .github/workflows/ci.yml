# CI gate for team collaboration: every pull request and every push to main is
# verified (typecheck + tests + production build) before it can be merged.
# Deploys are NOT done here — a maintainer ships to Firebase Hosting from their
# machine (`npm run deploy`), so production credentials never live in GitHub.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (production)
        run: npm run build
        env:
          # Optional: if a GEMINI_API_KEY repo secret is ever added, the build
          # uses it; otherwise it builds with an empty key (fine for a CI gate,
          # the key only matters at runtime on a real deploy).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
