# Production pipeline: when commits land on main (via merge or direct push),
# re-run the full gate (lint + test + build) and, if it passes, deploy to the
# LIVE Firebase Hosting site (hosting only — never firestore/functions).
name: main · verify + deploy live

on:
  push:
    branches: [main]

# Never cancel a live deploy mid-flight; let each push to main finish.
concurrency:
  group: live-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-and-deploy:
    name: Verify + deploy live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- Gate: a broken build never reaches production ----
      - name: Typecheck
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build (production)
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # ---- Live deploy: skips cleanly until the service-account secret exists ----
      - name: Check deploy secret
        id: gate
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAWKAMAH }}
        run: |
          if [ -n "$SA" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped::FIREBASE_SERVICE_ACCOUNT_HAWKAMAH is not set — add it in repo Settings → Secrets to enable live deploys."
          fi

      - name: Deploy to live
        if: steps.gate.outputs.ready == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAWKAMAH }}
          projectId: gen-lang-client-0579241284
          channelId: live
